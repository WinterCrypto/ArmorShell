    --bg:#1b1f25; --panel:#232830; --panel-2:#2b313a; --line:#333a44; --line-soft:#282e36;
    --ink:#eceef1; --ink-dim:#b4bcc6; --muted:#88909b; --faint:#606871;
    --accent:#5fb1cb; --accent-hi:#8cc8de; --accent-deep:#4e9ab4;
    --accent-soft:rgba(95,177,203,.14); --accent-line:rgba(95,177,203,.30); --accent-faint:rgba(95,177,203,.06);
    --danger:#e58c79;
    --shadow:rgba(0,0,0,.5); --ring:rgba(255,255,255,.14); --glow:rgba(95,177,203,.07);
    --backdrop:rgba(8,9,11,.6); --spin-track:rgba(255,255,255,.14);
    --plate:#15181d; --bar-bg:rgba(27,31,37,.85); --code-bg:#15181d; --code-ink:#cdd3da;
    --toast-bg:#232830; --toast-ink:#eceef1; --btn-ink:#102026; --more-bg:rgba(21,24,29,.66); --more-ink:#b4bcc6;
    --html:#6cb6cd; --css:#7e9cff; --js:#e2c15f; --txt:#9aa3ad;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --bar:48px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-text-size-adjust:100%;overflow-x:hidden;}
  body{background-image:radial-gradient(120% 70% at 50% -10%,var(--glow),transparent 62%);}
  ::selection{background:var(--accent-line);color:var(--ink);}
  button{font-family:inherit;cursor:pointer;}
  body{scrollbar-width:none;} body::-webkit-scrollbar{display:none;}

  .view{display:none;}
  .view.active{display:block;animation:viewIn .28s ease both;}
  @keyframes viewIn{from{opacity:0;transform:translateY(6px) scale(.996);}to{opacity:1;transform:none;}}
  @keyframes tileIn{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:none;}}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- Library ---------- */
  #library{min-height:100%;padding:calc(env(safe-area-inset-top) + 22px) 18px calc(env(safe-area-inset-bottom) + 40px);max-width:640px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .brand .mk{width:26px;height:26px;flex:none;}
  .brand .mk svg{width:100%;height:100%;display:block;}
  .brand h1{font-size:18.5px;font-weight:700;letter-spacing:-0.02em;}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;}
  .add{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:11px;background:var(--accent-soft);border:1px solid var(--accent-line);color:var(--accent-hi);font-size:13px;font-weight:650;font-family:inherit;white-space:nowrap;transition:background .15s,transform .15s;}
  .add:active{transform:scale(.97);background:var(--accent-line);}
  .add svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
  .hero{text-align:center;padding:30px 8px 4px;}
  .hero .mark{width:72px;height:72px;margin:0 auto 22px;border-radius:19px;overflow:hidden;box-shadow:0 14px 30px var(--shadow),inset 0 0 0 1px rgba(255,255,255,.18);}
  .hero .mark svg{width:100%;height:100%;display:block;}
  .hero .heroname{font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--ink);margin-bottom:9px;}
  .hero p{font-size:13.5px;color:var(--muted);line-height:1.62;max-width:332px;margin:0 auto 24px;}
  .hero p b{color:var(--ink-dim);font-weight:600;}
  .hero .import-btn{max-width:300px;margin:0 auto;}
  .tagline{color:var(--muted);font-size:13.5px;margin-bottom:22px;}

  .import-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:var(--btn-ink);font-size:15px;font-weight:700;letter-spacing:.01em;transition:transform .15s,filter .15s;}
  .import-btn:active{transform:scale(.99);filter:brightness(1.05);}
  .import-btn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round;}
  .dropzone.drag .import-btn{outline:2px dashed var(--accent);outline-offset:3px;}

  .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:4px 2px 14px;display:flex;align-items:center;justify-content:space-between;}
  .lbl .use{font-weight:600;letter-spacing:.02em;text-transform:none;color:var(--faint);}

  .file{display:flex;align-items:center;gap:13px;padding:14px 14px;background:var(--panel);border:1px solid var(--line);border-radius:13px;margin-bottom:9px;cursor:pointer;transition:border-color .18s,background .18s;}
  .file:active{background:var(--panel-2);}
  .file .ic{width:42px;height:42px;flex:none;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;letter-spacing:.02em;border:1px solid var(--line);background:var(--panel-2);}
  .file .ic.html{color:var(--html);border-color:rgba(93,176,199,.4);}
  .file .ic.css{color:var(--css);border-color:rgba(126,156,255,.4);}
  .file .ic.js{color:var(--js);border-color:rgba(226,193,95,.4);}
  .file .ic.txt,.file .ic.json,.file .ic.md{color:var(--txt);}
  .file .info{flex:1;min-width:0;}
  .file .nm{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .file .meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .file .acts{display:flex;gap:2px;flex:none;}
  .iconbtn{width:34px;height:34px;border:none;background:none;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
  .iconbtn:active{background:var(--panel-2);}
  .iconbtn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
  .iconbtn.del:active{color:#e08a78;}

  .empty{text-align:center;padding:30px 16px 8px;color:var(--muted);}
  .empty .big{width:48px;height:48px;margin:0 auto 16px;opacity:.7;}
  .empty .big svg{width:100%;height:100%;stroke:var(--accent);fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round;}
  .empty h2{font-size:17px;color:var(--ink);font-weight:600;margin-bottom:10px;}
  .empty p{font-size:13.5px;line-height:1.6;max-width:360px;margin:0 auto;}
  .empty p b{color:var(--ink-dim);font-weight:600;}

  .privacy{display:flex;gap:10px;align-items:flex-start;margin-top:26px;padding:14px;border:1px solid var(--line-soft);border-radius:12px;background:var(--accent-faint);}
  .privacy svg{width:18px;height:18px;flex:none;stroke:var(--accent);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;margin-top:1px;}
  .privacy p{font-size:12.5px;color:var(--muted);line-height:1.55;}
  .privacy b{color:var(--ink-dim);font-weight:600;}

  details.help{margin-top:14px;border:1px solid var(--line-soft);border-radius:12px;background:var(--panel);overflow:hidden;}
  details.help summary{list-style:none;cursor:pointer;padding:14px;font-size:13px;font-weight:600;color:var(--ink-dim);display:flex;align-items:center;gap:9px;}
  details.help summary::-webkit-details-marker{display:none;}
  details.help summary .chev{margin-left:auto;transition:transform .2s;color:var(--muted);font-size:12px;}
  details.help[open] summary .chev{transform:rotate(90deg);}
  details.help .body{padding:0 14px 16px;font-size:13px;line-height:1.65;color:var(--muted);}
  details.help .body ol{margin:6px 0 0 18px;}
  details.help .body li{margin-bottom:7px;}
  details.help .body b{color:var(--ink-dim);font-weight:600;}

  /* ---------- App grid (launcher) ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:24px 12px;margin-top:8px;}
  .grid.anim .tile{animation:tileIn .42s cubic-bezier(.2,.7,.2,1) both;}
  .tile{position:relative;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
  .appicon{width:66px;height:66px;border-radius:17px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--plate);box-shadow:0 0 0 1px var(--ring),0 8px 20px var(--shadow);transition:transform .16s cubic-bezier(.2,.7,.2,1);}
  .tile:active .appicon{transform:scale(.93);}
  .appicon img{width:100%;height:100%;object-fit:cover;display:block;-webkit-user-drag:none;user-select:none;}
  .appicon.generic{border:1px solid var(--line);}
  .appicon.generic svg{width:30px;height:30px;fill:none;stroke:currentColor;stroke-width:1.55;stroke-linecap:round;stroke-linejoin:round;}
  .appicon.generic.html{background:linear-gradient(145deg,color-mix(in srgb,var(--html) 18%,var(--plate)),var(--plate));color:var(--html);}
  .appicon.generic.css{background:linear-gradient(145deg,color-mix(in srgb,var(--css) 18%,var(--plate)),var(--plate));color:var(--css);}
  .appicon.generic.js,.appicon.generic.json{background:linear-gradient(145deg,color-mix(in srgb,var(--js) 18%,var(--plate)),var(--plate));color:var(--js);}
  .appicon.generic.txt,.appicon.generic.md{background:linear-gradient(145deg,color-mix(in srgb,var(--txt) 14%,var(--plate)),var(--plate));color:var(--txt);}
  .tname{font-size:12px;line-height:1.25;text-align:center;color:var(--ink-dim);max-width:88px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;}
  .more{position:absolute;top:-6px;right:2px;width:23px;height:23px;border:none;background:var(--more-bg);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--more-ink);opacity:.5;transition:opacity .15s,background .15s;z-index:2;box-shadow:0 1px 3px var(--shadow);}
  .more:active{opacity:1;background:var(--panel-2);}
  .tile:hover .more{opacity:1;}
  .more svg{width:13px;height:13px;fill:currentColor;}
  .legacy{margin-top:14px;padding:13px 15px;background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;}
  .legacy p{margin:0 0 10px;font-size:12.5px;color:var(--muted);line-height:1.5;}
  .legacy .lbtn{appearance:none;border:1px solid var(--accent-line);background:var(--accent-soft);color:var(--accent-hi);font:inherit;font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:10px;cursor:pointer;}
  .legacy .lbtn:active{transform:scale(.98);}
  /* drag-to-reorder */
  .tile.dragging{opacity:0;}
  .drag-clone{position:fixed;left:0;top:0;z-index:9999;margin:0;pointer-events:none;will-change:transform;}
  .drag-clone .more{display:none;}
  .drag-clone .appicon{box-shadow:0 0 0 1px var(--ring),0 18px 34px rgba(0,0,0,.55);}
  .drag-clone .appicon{transform:none;}

  /* ---------- Action sheet ---------- */
  .asheet{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-end;justify-content:center;background:var(--backdrop);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s;}
  .asheet.show{opacity:1;visibility:visible;}
  .asheet-card{width:100%;max-width:520px;margin:0 10px 10px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:6px 10px calc(env(safe-area-inset-bottom) + 12px);transform:translateY(115%);transition:transform .32s cubic-bezier(.2,.75,.2,1);box-shadow:0 -10px 40px var(--shadow);}
  .asheet.show .asheet-card{transform:translateY(0);}
  .asheet-grab{width:36px;height:4px;border-radius:3px;background:var(--line);margin:8px auto 4px;}
  .asheet-head{display:flex;align-items:center;gap:12px;padding:10px 10px 14px;border-bottom:1px solid var(--line-soft);margin-bottom:6px;}
  .asheet-head .appicon{width:42px;height:42px;border-radius:11px;box-shadow:none;flex:none;}
  .asheet-head .appicon.generic svg{width:21px;height:21px;}
  .ah-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .aitem{display:flex;align-items:center;gap:14px;width:100%;text-align:left;border:none;background:none;color:var(--ink);font-size:15.5px;font-family:inherit;padding:14px 10px;border-radius:12px;}
  .aitem:active{background:var(--panel-2);}
  .aitem svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex:none;}
  .aitem.danger{color:var(--danger);} .aitem.danger svg{stroke:var(--danger);}
  .aitem.cancel{justify-content:center;color:var(--muted);font-weight:600;margin-top:2px;}

  /* ---------- Runner ---------- */
  #runner.active,#code.active{display:flex;flex-direction:column;position:fixed;inset:0;background:var(--bg);}
  .bar{flex:none;height:calc(var(--bar) + env(safe-area-inset-top));padding:env(safe-area-inset-top) 8px 0;display:flex;align-items:center;gap:6px;background:var(--bar-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
  .bar .back{display:flex;align-items:center;gap:5px;border:none;background:none;color:var(--accent-hi);font-size:15px;font-weight:600;padding:8px 8px;border-radius:9px;}
  .bar .back svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round;}
  .bar .title{flex:1;min-width:0;text-align:center;font-size:13.5px;font-weight:600;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;}
  .bar .tbtn{border:none;background:none;color:var(--muted);padding:8px;border-radius:9px;display:flex;align-items:center;justify-content:center;}
  .bar .tbtn:active{background:var(--panel-2);color:var(--ink);}
  .bar .tbtn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .bar .tbtn.txt{font-size:12.5px;font-weight:700;letter-spacing:.04em;color:var(--accent-hi);padding:8px 10px;}
  .stage{flex:1;position:relative;background:var(--bg);}
  .stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:transparent;}
  .stage-load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:3;transition:opacity .35s ease;}
  .stage-load.hide{opacity:0;pointer-events:none;}
  .spin{width:26px;height:26px;border-radius:50%;border:2.5px solid var(--spin-track);border-top-color:var(--accent);animation:spin .8s linear infinite;}

  /* ---------- Code ---------- */
  .codewrap{flex:1;overflow:auto;background:var(--code-bg);}
  pre.code{margin:0;padding:16px calc(env(safe-area-inset-bottom) + 16px) 40px;font-family:var(--mono);font-size:12px;line-height:1.6;color:var(--code-ink);white-space:pre;tab-size:2;}
  pre.code.wrap{white-space:pre-wrap;word-break:break-word;}

  .toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(env(safe-area-inset-bottom) + 26px);z-index:50;background:var(--toast-bg);border:1px solid var(--line);color:var(--toast-ink);padding:12px 18px;border-radius:24px;font-size:13.5px;box-shadow:0 12px 30px var(--shadow);opacity:0;visibility:hidden;transition:opacity .25s,transform .25s,visibility .25s;}
  .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion: reduce){*{transition-duration:.01ms !important;}}
</style>
</head>
<body>

<section class="view active" id="library"></section>

<section class="view" id="runner">
  <div class="bar">
    <button class="back" data-back><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>Files</button>
    <div class="title" id="runTitle"></div>
    <button class="tbtn" data-reload aria-label="Reload"><svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-.6 4"/><path d="M20 5v6h-6"/></svg></button>
    <button class="tbtn txt" data-view-source>Source</button>
  </div>
  <div class="stage" id="stage"></div>
</section>

<section class="view" id="code">
  <div class="bar">
    <button class="back" data-back-code><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>Files</button>
    <div class="title" id="codeTitle"></div>
    <button class="tbtn" data-run-instead aria-label="Run"><svg viewBox="0 0 24 24"><path d="M7 5l12 7-12 7z"/></svg></button>
    <button class="tbtn" data-wrap aria-label="Wrap"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h12a3 3 0 0 1 0 6h-3m0 0l2-2m-2 2l2 2M4 17h4"/></svg></button>
    <button class="tbtn txt" data-copy>Copy</button>
  </div>
  <div class="codewrap"><pre class="code" id="codePre"></pre></div>
</section>

<input type="file" id="picker" multiple accept=".html,.htm,.css,.js,.mjs,.json,.txt,.md,.markdown,.xml,.svg,text/html,text/css,text/javascript,application/javascript,application/json,text/plain,text/markdown,.zip,application/zip,application/x-zip-compressed" style="display:none">
<div class="asheet" id="asheet"><div class="asheet-card" id="asheetCard"></div></div>
<div class="toast" id="toast"></div>

    var f=document.createElement("iframe");
    f.setAttribute("allow","clipboard-read; clipboard-write; web-share; fullscreen");
    f.setAttribute("referrerpolicy","no-referrer");
    var hide=function(){ load.classList.add("hide"); setTimeout(function(){ if(load.parentNode) load.parentNode.removeChild(load); },380); };
    f.addEventListener("load", hide);
    stage.appendChild(f);
    // srcdoc runs the file in this same origin -> its localStorage works and persists.
    // The injected shim transparently scopes the app's storage to its own compartment (lv.app.<id>.*).
    f.srcdoc = (currentId!=null) ? injectSandbox(html, currentId) : html;
    setTimeout(hide, 5000);
  }
  function reloadFrame(){ if(currentId!=null) mountFrame(getContent(currentId)); }
  function unmountFrame(){ var stage=document.getElementById("stage"); if(stage) stage.innerHTML=""; }

  var wrapOn=false;
  function openCode(it){
    currentId=it.id;
    document.getElementById("codeTitle").textContent=displayName(it);
    var pre=document.getElementById("codePre");
    pre.textContent=getContent(it.id);
    pre.classList.toggle("wrap", wrapOn);
    document.querySelector(".codewrap").scrollTop=0;
    // show "run" button only for html
    document.querySelector("[data-run-instead]").style.display = (it.kind==="html") ? "" : "none";
    showView("code");
  }

  function showView(name){
    if(name==="library") gridAnim=true;
    ["library","runner","code"].forEach(function(v){ document.getElementById(v).classList.toggle("active", v===name); });
    if(name!=="runner") unmountFrame();
    window.scrollTo(0,0);
  }

  /* ===== Rename / delete ===== */
  function renameItem(id){
    var it=findItem(id); if(!it) return;
    var nn=prompt("Rename file", it.name);
    if(nn==null) return;
    nn=nn.trim(); if(!nn) return;
    it.name=nn; it.kind=detectKind(nn); saveIndex(); renderLibrary();
  }
  function deleteItem(id){
    var it=findItem(id); if(!it) return;
    if(!confirm('Delete "'+it.name+'" and the data it saved on this device? (The original file on your computer/phone is not affected.)')) return;
    clearAppData(id);
    store.remove(contentKey(id));
    index=index.filter(function(x){ return x.id!==id; });
    saveIndex(); renderLibrary();
    toast("Deleted, data cleared.");
  }
  function resetItemData(id){
    var it=findItem(id); if(!it) return;
    if(!confirm('Reset data for "'+displayName(it)+'"? The app stays installed but starts fresh.')) return;
    clearAppData(id);
    toast("Data cleared.");
  }

  /* ===== Action sheet ===== */
  var menuId=null;
  function openMenu(id){
    var it=findItem(id); if(!it) return; menuId=id;
    var src = (it.kind==="html") ? '<button class="aitem" data-act="source"><svg viewBox="0 0 24 24"><path d="M9 8l-4 4 4 4M15 8l4 4-4 4"/></svg>View source</button>' : '';
    document.getElementById("asheetCard").innerHTML=''+
      '<div class="asheet-grab"></div>'+
      '<div class="asheet-head">'+iconHTML(it)+'<span class="ah-name">'+esc(displayName(it))+'</span></div>'+
      '<button class="aitem" data-act="open"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'+(it.kind==="html"?"Open app":"Open")+'</button>'+
      src+
      '<button class="aitem" data-act="rename"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Rename</button>'+
      '<button class="aitem" data-act="reset"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>Reset app data</button>'+
      '<button class="aitem danger" data-act="delete"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>Delete</button>'+
      '<button class="aitem cancel" data-act="cancel">Cancel</button>';
    document.getElementById("asheet").classList.add("show");
  }
  function closeMenu(){ var s=document.getElementById("asheet"); if(s) s.classList.remove("show"); }

  /* ===== Toast ===== */
  var tT=null;
  function toast(msg){ var t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(tT); tT=setTimeout(function(){ t.classList.remove("show"); },2600); }

  /* ===== Copy ===== */
  function copyCode(){
    var pre=document.getElementById("codePre"), text=pre.textContent;
    var done=function(){ toast("Copied to clipboard."); };
    try{ if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done, function(){ legacy(); }); return; } }catch(e){}
    legacy();
    function legacy(){ try{ var r=document.createRange(); r.selectNodeContents(pre); var s=window.getSelection(); s.removeAllRanges(); s.addRange(r); document.execCommand("copy"); s.removeAllRanges(); done(); }catch(e){ toast("Couldn\u2019t copy."); } }
  }

  /* ===== Events ===== */
  document.addEventListener("click", function(e){
    var t=e.target;
    if(dnd.suppressClick){ dnd.suppressClick=false; return; }
    if(t.id==="asheet"){ closeMenu(); return; }
    var menuBtn=t.closest&&t.closest("[data-menu]");
    if(menuBtn){ e.stopPropagation(); openMenu(menuBtn.getAttribute("data-menu")); return; }
    var act=t.closest&&t.closest("[data-act]");
    if(act){ var a=act.getAttribute("data-act"), mid=menuId; closeMenu();
      if(a==="open"){ if(mid) openItem(mid); }
      else if(a==="source"){ var srcIt=findItem(mid); if(srcIt) openCode(srcIt); }
      else if(a==="rename"){ renameItem(mid); }
      else if(a==="reset"){ resetItemData(mid); }
      else if(a==="delete"){ deleteItem(mid); }
      return;
    }
    var open=t.closest&&t.closest("[data-open]");
    if(open){ openItem(open.getAttribute("data-open")); return; }

    if(t.closest&&t.closest("[data-legacy-clean]")){
      var lk2=legacyKeys();
      if(!lk2.length){ renderLibrary(); return; }
      if(confirm("Clear "+lk2.length+" leftover data "+(lk2.length===1?"entry":"entries")+"? Apps no longer read these, so nothing you use is affected.")){
        for(var li=0; li<lk2.length; li++){ try{ localStorage.removeItem(lk2[li]); }catch(_){ } }
        toast("Leftover data cleared."); renderLibrary();
      }
      return;
    }
    if(t.closest&&t.closest("[data-import]")){ document.getElementById("picker").click(); return; }
    if(t.closest&&t.closest("[data-back]")){ showView("library"); renderLibrary(); return; }
    if(t.closest&&t.closest("[data-back-code]")){ showView("library"); renderLibrary(); return; }
    if(t.closest&&t.closest("[data-reload]")){ reloadFrame(); toast("Reloaded."); return; }
    if(t.closest&&t.closest("[data-view-source]")){ var it=findItem(currentId); if(it) openCode(it); return; }
    if(t.closest&&t.closest("[data-run-instead]")){ var it2=findItem(currentId); if(it2 && it2.kind==="html") openRunner(it2); return; }
    if(t.closest&&t.closest("[data-wrap]")){ wrapOn=!wrapOn; document.getElementById("codePre").classList.toggle("wrap",wrapOn); return; }
    if(t.closest&&t.closest("[data-copy]")){ copyCode(); return; }
  });

  document.getElementById("picker").addEventListener("change", function(e){
    importFiles(e.target.files);
    e.target.value="";   // allow re-importing same filename later
  });

  /* ===== Drag to reorder (pointer-based: works with touch + mouse) ===== */
  var dnd={ active:false, armed:false, canceled:false, mouse:false, lock:false, lockT:null, id:null, el:null, clone:null,
            sx:0, sy:0, x:0, y:0, ox:0, oy:0, hold:null, moved:false, suppressClick:false };
  function dndReset(){ clearTimeout(dnd.hold); dnd.hold=null; clearTimeout(dnd.lockT); dnd.lockT=null; dnd.lock=false; dnd.active=false; dnd.armed=false; dnd.canceled=false; dnd.mouse=false; dnd.moved=false; dnd.id=null; dnd.el=null; dnd.clone=null; }
  function arrIndex(id){ for(var i=0;i<index.length;i++){ if(index[i].id===id) return i; } return -1; }
  function cssEsc(s){ return (window.CSS && CSS.escape) ? CSS.escape(s) : String(s).replace(/"/g,'\\"'); }

  function dndDown(e){
    if(e.pointerType==="mouse" && e.button!==0) return;
    var lib=document.getElementById("library");
    if(!lib || !lib.classList.contains("active")) return;
    if(e.target.closest && e.target.closest("[data-menu]")) return;     // leave the ⋯ button alone
    var tile=e.target.closest && e.target.closest(".tile[data-open]");
    if(!tile) return;
    if(index.length<2) return;                                          // nothing to reorder
    dnd.active=true; dnd.armed=false; dnd.canceled=false; dnd.moved=false;
    dnd.mouse=(e.pointerType==="mouse");
    dnd.id=tile.getAttribute("data-open"); dnd.el=tile;
    dnd.sx=dnd.x=e.clientX; dnd.sy=dnd.y=e.clientY;
    clearTimeout(dnd.hold); dnd.hold=null;
    if(!dnd.mouse){ dnd.hold=setTimeout(dndArm, 300); }   // touch: hold to lift. mouse: arm on first movement (see dndMove)
  }
  function dndArm(){
    if(!dnd.active || dnd.canceled || !dnd.el) return;
    dnd.armed=true; dnd.moved=false;
    var r=dnd.el.getBoundingClientRect();
    dnd.ox=dnd.x-r.left; dnd.oy=dnd.y-r.top;
    var c=dnd.el.cloneNode(true);
    c.className="tile drag-clone";
    c.style.width=r.width+"px";
    c.style.transform="translate("+r.left+"px,"+r.top+"px) scale(1)";
    document.body.appendChild(c); dnd.clone=c;
    requestAnimationFrame(function(){ if(!dnd.clone) return; dnd.clone.style.transition="transform .14s cubic-bezier(.2,.7,.2,1)"; dndMoveClone(); setTimeout(function(){ if(dnd.clone) dnd.clone.style.transition="none"; }, 150); });
    dnd.el.classList.add("dragging");
    try{ if(navigator.vibrate) navigator.vibrate(9); }catch(_){}
  }
  function dndMoveClone(){ if(dnd.clone){ dnd.clone.style.transform="translate("+(dnd.x-dnd.ox)+"px,"+(dnd.y-dnd.oy)+"px) scale(1.07)"; } }
  function dndTargetIndex(){
    // insertion index = how many OTHER tiles' centers the pointer has passed in reading order.
    // you must cross a tile's center to move past it -> precise side placement + a stable fixpoint (no oscillation).
    var tiles=[].slice.call(document.querySelectorAll("#appGrid .tile")), k=0;
    for(var i=0;i<tiles.length;i++){
      var id=tiles[i].getAttribute("data-open"); if(id===dnd.id) continue;
      var r=tiles[i].getBoundingClientRect(), cx=r.left+r.width/2;
      if(dnd.y > r.bottom){ k++; }                            // pointer is below this tile's whole row
      else if(dnd.y >= r.top-2 && dnd.x > cx){ k++; }         // same row, and right of this tile's center
    }
    return k;
  }
  function dndRectsById(){ var m={}, t=document.querySelectorAll("#appGrid .tile"); for(var i=0;i<t.length;i++){ m[t[i].getAttribute("data-open")]=t[i].getBoundingClientRect(); } return m; }
  function dndFlip(first){
    var t=document.querySelectorAll("#appGrid .tile");
    for(var i=0;i<t.length;i++){
      var el=t[i], id=el.getAttribute("data-open"); if(id===dnd.id) continue;
      var f=first[id]; if(!f) continue;
      var l=el.getBoundingClientRect(), dx=f.left-l.left, dy=f.top-l.top;
      if(!dx && !dy) continue;
      el.style.transition="none"; el.style.transform="translate("+dx+"px,"+dy+"px)";
      el.getBoundingClientRect();
      el.style.transition="transform .16s cubic-bezier(.2,.7,.2,1)"; el.style.transform="";
    }
  }
  function dndReorderTo(to){
    var from=arrIndex(dnd.id);
    if(to<0 || from<0 || to===from) return;
    var first=dndRectsById();
    var it=index.splice(from,1)[0]; index.splice(to,0,it); saveIndex();
    renderGridOnly();
    dnd.el=document.querySelector('#appGrid .tile[data-open="'+cssEsc(dnd.id)+'"]');
    if(dnd.el) dnd.el.classList.add("dragging");
    dndFlip(first);
    dnd.lock=true; clearTimeout(dnd.lockT); dnd.lockT=setTimeout(function(){ dnd.lock=false; }, 185);  // let the shuffle settle before allowing the next swap
  }
  function dndMove(e){
    if(!dnd.active) return;
    dnd.x=e.clientX; dnd.y=e.clientY;
    if(!dnd.armed){
      var dx=dnd.x-dnd.sx, dy=dnd.y-dnd.sy, d2=dx*dx+dy*dy;
      if(dnd.mouse){
        if(d2<=16) return;          // tiny move: still treat as a click
        dndArm();                   // mouse: arm immediately on drag
        if(!dnd.armed) return;
      } else {
        if(d2>144){ dnd.canceled=true; clearTimeout(dnd.hold); dnd.hold=null; dnd.active=false; }   // touch moved before lift => let it scroll
        return;
      }
    }
    if(e.preventDefault) e.preventDefault();
    dnd.moved=true; dndMoveClone();
    if(dnd.lock) return;                                 // keep following the cursor, but don't swap mid-shuffle
    var to=dndTargetIndex();
    if(to!==arrIndex(dnd.id)) dndReorderTo(to);
  }
  function dndUp(){
    if(!dnd.armed){ dndReset(); return; }
    dnd.suppressClick=true; setTimeout(function(){ dnd.suppressClick=false; }, 550);
    dnd.lock=false; clearTimeout(dnd.lockT);                                   // land exactly where released
    var fin=dndTargetIndex(); if(fin!==arrIndex(dnd.id)) dndReorderTo(fin);
    var target=dnd.el ? dnd.el.getBoundingClientRect() : null, c=dnd.clone;
    if(c){
      if(target){ c.style.transition="transform .18s cubic-bezier(.2,.7,.2,1)"; c.style.transform="translate("+target.left+"px,"+target.top+"px) scale(1)"; setTimeout(function(){ if(c&&c.parentNode) c.parentNode.removeChild(c); }, 200); }
      else if(c.parentNode){ c.parentNode.removeChild(c); }
    }
    if(dnd.el) dnd.el.classList.remove("dragging");
    saveIndex(); dndReset();
  }
  function dndCancel(){ if(dnd.clone && dnd.clone.parentNode) dnd.clone.parentNode.removeChild(dnd.clone); if(dnd.el) dnd.el.classList.remove("dragging"); dndReset(); }
  document.addEventListener("pointerdown", dndDown);
  document.addEventListener("pointermove", dndMove, {passive:false});
  document.addEventListener("pointerup", dndUp);
  document.addEventListener("pointercancel", dndCancel);
  document.addEventListener("touchmove", function(e){ if(dnd.armed){ e.preventDefault(); } }, {passive:false});  // stop iOS scroll mid-drag
  document.addEventListener("dragstart", function(e){ if(e.target && e.target.closest && e.target.closest(".tile")){ e.preventDefault(); } });  // block native drag of tiles (lets mouse pointer-drag work)

  // Drag & drop (desktop convenience)
  document.addEventListener("dragover", function(e){ if(document.getElementById("library").classList.contains("active")){ e.preventDefault(); var dz=document.getElementById("dropzone"); if(dz) dz.classList.add("drag"); } });
  document.addEventListener("dragleave", function(e){ var dz=document.getElementById("dropzone"); if(dz && (e.target===dz || !e.relatedTarget)) dz.classList.remove("drag"); });
  document.addEventListener("drop", function(e){ if(document.getElementById("library").classList.contains("active")){ e.preventDefault(); var dz=document.getElementById("dropzone"); if(dz) dz.classList.remove("drag"); if(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) importFiles(e.dataTransfer.files); } });

  // Hardware/gesture back closes runner/code first
  window.addEventListener("popstate", function(){ if(!document.getElementById("library").classList.contains("active")){ showView("library"); renderLibrary(); } });

  /* ===== Init ===== */
  renderLibrary();
})();
</script>
</body>
</html>
